<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Exercícios</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--amarelo:#f5c842;--amarelo2:#e6b325;--amarelo-soft:#fff4cc;--laranja:#e8892a;--verde:#5cad5c;--roxo:#a07abf;--bg:#f6f5f2;--card:#ffffff;--borda:#e3dfd7;--texto:#2a2520}
body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--texto);padding:2rem 1rem 5rem}
.wrap{max-width:740px;margin:0 auto}
.topo{background:var(--amarelo);border-radius:16px 16px 0 0;padding:1.2rem 1.6rem;display:flex;gap:14px}
.card{background:var(--card);border:1px solid var(--borda);padding:1.2rem}
.field-row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px}
input,textarea{padding:8px;border-radius:8px;border:1px solid var(--borda);width:100%}
input:focus,textarea:focus{outline:none;border-color:var(--amarelo2);box-shadow:0 0 0 2px var(--amarelo-soft)}
.sec-header{display:flex;justify-content:space-between;padding:.7rem 1.4rem;background:var(--amarelo);margin-top:12px}
.bloco{background:#fff;border:1px solid var(--borda);padding:1rem;margin-top:6px}
.alt-p{display:flex;gap:6px;padding:4px;border-radius:6px}
.alt-p.correta-p{background:#e9f7ea;border:1px solid var(--verde)}
.btn-gerar{padding:10px 24px;border:none;background:var(--amarelo);cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
<div class="topo"><h2>Gerador de Lista</h2></div>
<div class="card">
<div class="field-row">
<input type="text" id="titulo" placeholder="Título">
<input type="text" id="disciplina" placeholder="Disciplina">
<input type="text" id="banca" placeholder="Banca">
</div>
</div>
<div class="sec-header">
<span>Questões</span>
<button id="btn-add">+ nova</button>
</div>
<div id="lista"></div>
<button id="btn-gerar" class="btn-gerar">Gerar PDF</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
(function(){
var idx=0;
var LETRAS=['A','B','C','D','E'];
function parseQuestao(txt){
var text=txt.trim();
var re=/(?:^|\n)\s*\(?\s*([a-eA-E])\s*[\)\.]?\s+/g;
var matches=[];
var m;
while((m=re.exec(text))!==null){
matches.push({idx:m.index,letter:m[1].toUpperCase(),len:m[0].length});
}
if(matches.length===0){return{enunciado:text,alts:{}};}
var enunciado=text.substring(0,matches[0].idx).trim();
var alts={};
for(var i=0;i<matches.length;i++){
var start=matches[i].idx+matches[i].len;
var end=i+1<matches.length?matches[i+1].idx:text.length;
alts[matches[i].letter]=text.substring(start,end).trim().replace(/\n/g,' ');
}
return{enunciado:enunciado,alts:alts};
}
function addQuestao(){
var id=idx++;
var div=document.createElement('div');
div.className='bloco';
div.innerHTML='<textarea id="q'+id+'" placeholder="Cole a questão"></textarea><div id="alts'+id+'"></div>';
document.getElementById('lista').appendChild(div);
document.getElementById('q'+id).addEventListener('input',function(){render(id);});
}
function render(id){
var txt=document.getElementById('q'+id).value;
var p=parseQuestao(txt);
var c=document.getElementById('alts'+id);
c.innerHTML='';
Object.keys(p.alts).forEach(function(l){
var d=document.createElement('div');
d.className='alt-p';
d.innerHTML='<b>'+l+')</b> '+p.alts[l];
c.appendChild(d);
});
}
function coletar(){
var qs=[];
document.querySelectorAll('textarea').forEach(function(t){
var p=parseQuestao(t.value);
if(p.enunciado){qs.push(p);}
});
return qs;
}
function gerarPDF(){
var jsPDF=window.jspdf.jsPDF;
var doc=new jsPDF();
var y=10;
var qs=coletar();
qs.forEach(function(q,i){
doc.text((i+1)+'. '+q.enunciado,10,y);
y+=6;
Object.keys(q.alts).forEach(function(l){
doc.text(l+') '+q.alts[l],12,y);
y+=5;
});
y+=4;
});
doc.save('lista.pdf');
}
document.getElementById('btn-add').onclick=addQuestao;
document.getElementById('btn-gerar').onclick=gerarPDF;
addQuestao();
})();
</script>
</body>
</html>
