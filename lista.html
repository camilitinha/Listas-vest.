<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lista de Exercícios</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif;
  font-weight:300;
  background:#fdf5f0;
  color:#3a2a26;
  padding:2.5rem 1rem 5rem;
  min-height:100vh;
}
.wrap{max-width:680px;margin:0 auto;}
/* Topo */
.topo{text-align:center;margin-bottom:2.2rem;}
h1{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:38px;
  font-weight:400;
  color:#b8806e;
  letter-spacing:0.02em;
  margin-bottom:6px;
}
.sub{font-size:13px;color:#c4aca4;letter-spacing:0.03em;}
/* Cards */
.card{
  background:#fffaf7;
  border:1px solid #edddd6;
  border-radius:18px;
  padding:1.4rem 1.5rem;
  margin-bottom:12px;
}
/* Campos de texto */
.field-row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;}
.field{display:flex;flex-direction:column;gap:5px;}
label{
  font-size:10.5px;
  font-weight:500;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:#c9a89e;
}
input[type=text]{
  font-family:'DM Sans',sans-serif;
  font-size:13.5px;
  font-weight:300;
  padding:9px 12px;
  border-radius:10px;
  border:1px solid #edddd6;
  background:#fff;
  color:#3a2a26;
  width:100%;
  transition:border-color .2s;
}
input[type=text]:focus{outline:none;border-color:#c9917f;}
input[type=text]::placeholder{color:#ddd0ca;}
/* Hint */
.hint{font-size:12px;color:#cbb9b2;margin-bottom:1.1rem;}
/* Bloco de questão */
.bloco{
  background:#fff;
  border:1px solid #edddd6;
  border-radius:14px;
  padding:1.1rem 1.2rem 1.1rem 1.1rem;
  margin-bottom:10px;
  position:relative;
}
.bloco-num{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:13px;
  color:#c9917f;
  margin-bottom:8px;
}
.q-input{
  font-family:'DM Sans',sans-serif;
  font-size:13.5px;
  font-weight:300;
  padding:9px 12px;
  border-radius:10px;
  border:1px solid #edddd6;
  background:#fdf5f0;
  color:#3a2a26;
  width:100%;
  margin-bottom:10px;
  transition:border-color .2s,background .2s;
}
.q-input:focus{outline:none;border-color:#c9917f;background:#fff;}
.q-input::placeholder{color:#ddd0ca;}

/* Alternativas */
.alts{display:flex;flex-direction:column;gap:6px;}
.alt-linha{display:grid;grid-template-columns:28px 1fr;align-items:center;gap:8px;}
.alt-letra{
  width:28px;height:28px;border-radius:50%;
  background:#fdf0eb;border:1px solid #edddd6;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:500;color:#c9917f;
  flex-shrink:0;transition:background .2s,border-color .2s;
}
.alt-linha.marcada .alt-letra{background:#deb8ae;border-color:#c9917f;color:#6b3a30;}
.alt-linha.marcada input{border-color:#c9917f;background:#fff8f5;}

/* Seletor de correta */
.correta-row{
  display:flex;align-items:center;gap:8px;
  margin-top:11px;padding-top:10px;
  border-top:1px solid #f5e5df;flex-wrap:wrap;
}
.correta-row > span{font-size:11.5px;color:#cbb9b2;}
.opcoes{display:flex;gap:5px;}
.r-inp{display:none;}
.r-label{
  width:28px;height:28px;border-radius:50%;
  border:1px solid #edddd6;background:#fdf5f0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:500;color:#c9917f;
  cursor:pointer;transition:background .15s,border-color .15s,color .15s;
  user-select:none;
}
.r-inp:checked + .r-label{background:#c9917f;border-color:#c9917f;color:#fff;}
.r-label:hover{background:#f5e5df;border-color:#c9917f;}
/* Botão remover */
.btn-del{
  position:absolute;top:12px;right:12px;
  background:none;border:none;font-size:18px;
  color:#e0d0cc;cursor:pointer;line-height:1;padding:2px;
  transition:color .15s;
}
.btn-del:hover{color:#c9917f;}
/* Botões principais */
.btn-add{
  font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:400;
  padding:8px 20px;border-radius:20px;
  border:1.5px dashed #d4a898;
  background:transparent;color:#b8806e;
  cursor:pointer;margin-top:6px;
  transition:background .15s;
  display:inline-block;
}
.btn-add:hover{background:#fff0ea;}
.rodape{display:flex;align-items:center;gap:14px;margin-top:4px;}
.btn-gerar{
  font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:500;
  padding:12px 30px;border-radius:24px;
  border:none;background:#c9917f;color:#fff;
  cursor:pointer;letter-spacing:0.03em;
  transition:background .15s,transform .1s;
  display:inline-block;
}
.btn-gerar:hover{background:#b8806e;}
.btn-gerar:active{transform:scale(.97);}
.status{font-size:13px;color:#cbb9b2;}
.status.ok{color:#a07060;font-weight:500;}
.status.erro{color:#c07080;font-weight:500;}
@media(max-width:520px){
  .field-row{grid-template-columns:1fr;}
  h1{font-size:30px;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="topo">
    <h1>lista de exercícios</h1>
    <p class="sub">preencha as questões e gere seu pdf com gabarito embaralhado</p>
  </div>
  <div class="card">
    <div class="field-row">
      <div class="field">
        <label>título</label>
        <input type="text" id="titulo" placeholder="ex: Simulado de Biologia"/>
      </div>
      <div class="field">
        <label>disciplina</label>
        <input type="text" id="disciplina" placeholder="ex: Química"/>
      </div>
      <div class="field">
        <label>banca</label>
        <input type="text" id="banca" placeholder="ex: FUVEST"/>
      </div>
    </div>
  </div>
  <div class="card">
    <p class="hint">adicione suas questões com alternativas de a a e</p>
    <div id="lista"></div>
    <button type="button" class="btn-add" id="btn-add">+ nova questão</button>
  </div>
  <div class="rodape">
    <button type="button" class="btn-gerar" id="btn-gerar">gerar pdf</button>
    <span class="status" id="status"></span>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
(function(){
  var idx = 0;
  var LETRAS = ['A','B','C','D','E'];
  function addQuestao(){
    var id = idx++;
    var num = document.querySelectorAll('.bloco').length + 1;
    var altsHTML = LETRAS.map(function(l){
      return '<div class="alt-linha" id="ln'+id+l+'">'
        +'<span class="alt-letra">'+l+'</span>'
        +'<input type="text" id="alt'+id+l+'" placeholder="alternativa '+l.toLowerCase()+'...">'
        +'</div>';
    }).join('');
    var radiosHTML = LETRAS.map(function(l){
      return '<input type="radio" class="r-inp" name="c'+id+'" id="r'+id+l+'" value="'+l+'"'+(l==='A'?' checked':'')+'>'
        +'<label class="r-label" for="r'+id+l+'">'+l+'</label>';
    }).join('');
    var div = document.createElement('div');
    div.className = 'bloco';
    div.id = 'bloco'+id;
    div.innerHTML =
      '<div class="bloco-num">questão '+num+'</div>'
      +'<button type="button" class="btn-del" id="del'+id+'">×</button>'
      +'<input type="text" class="q-input" id="q'+id+'" placeholder="enunciado da questão...">'
      +'<div class="alts">'+altsHTML+'</div>'
      +'<div class="correta-row"><span>resposta correta:</span>'
      +'<div class="opcoes">'+radiosHTML+'</div></div>';
    document.getElementById('lista').appendChild(div);
    /* eventos dos radios */
    LETRAS.forEach(function(l){
      document.getElementById('r'+id+l).addEventListener('change', function(){
        marcar(id);
      });
    });
    /* botão remover */
    document.getElementById('del'+id).addEventListener('click', function(){
      document.getElementById('bloco'+id).remove();
      renumerar();
    });
    marcar(id);
  }
  function marcar(id){
    var sel = document.querySelector('input[name="c'+id+'"]:checked');
    var correta = sel ? sel.value : 'A';
    LETRAS.forEach(function(l){
      var ln = document.getElementById('ln'+id+l);
      if(ln) ln.classList.toggle('marcada', l===correta);
    });
  }
  function renumerar(){
    var nums = document.querySelectorAll('.bloco-num');
    nums.forEach(function(el,i){ el.textContent='questão '+(i+1); });
  }
  function embaralhar(arr){
    for(var i=arr.length-1;i>0;i--){
      var j=Math.floor(Math.random()*(i+1));
      var tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp;
    }
    return arr;
  }
  function coletar(){
    var qs=[];
    document.querySelectorAll('.bloco').forEach(function(b){
      var id=b.id.replace('bloco','');
      var enunciado=(document.getElementById('q'+id)||{}).value||'';
      enunciado=enunciado.trim();
      if(!enunciado) return;
      var alts={};
      LETRAS.forEach(function(l){
        alts[l]=((document.getElementById('alt'+id+l)||{}).value||'').trim();
      });
      var sel=document.querySelector('input[name="c'+id+'"]:checked');
      qs.push({enunciado:enunciado,alts:alts,correta:sel?sel.value:'A'});
    });
    return qs;
  }
  function gerarPDF(){
    if(!window.jspdf){ alert('Aguarde o jsPDF carregar.'); return; }
    var jsPDF=window.jspdf.jsPDF;
    var titulo=(document.getElementById('titulo').value||'Lista de Exercícios').trim();
    var disc=(document.getElementById('disciplina').value||'').trim();
    var banca=(document.getElementById('banca').value||'').trim();
    var statusEl=document.getElementById('status');
    var qs=embaralhar(coletar());
    if(qs.length===0){
      statusEl.textContent='adicione ao menos uma questão!';
      statusEl.className='status erro';
      return;
    }
    var doc=new jsPDF({unit:'mm',format:'a4'});
    var W=210,ML=15,MR=15,TW=W-ML-MR;
    var ROSA=[185,125,110],ROSA_CL=[240,218,210],BORDA=[230,215,210];
    var pag=1;
    var y=0;
    function header(sec){
      doc.setFillColor(ROSA_CL[0],ROSA_CL[1],ROSA_CL[2]);
      doc.rect(ML,10,TW,10,'F');
      doc.setFont('times','italic');
      doc.setFontSize(12);
      doc.setTextColor(ROSA[0],ROSA[1],ROSA[2]);
      doc.text(titulo,ML+4,17);
      var meta=[disc,banca].filter(Boolean).join(' · ');
      if(meta){
        doc.setFont('helvetica','normal');
        doc.setFontSize(8);
        doc.setTextColor(190,160,150);
        doc.text(meta,W-MR-2,17,{align:'right'});
      }
      doc.setFont('helvetica','normal');
      doc.setFontSize(8);
      doc.setTextColor(200,175,168);
      doc.text(sec.toUpperCase(),ML+4,26);
      doc.setDrawColor(ROSA_CL[0],ROSA_CL[1],ROSA_CL[2]);
      doc.line(ML,27.5,W-MR,27.5);
    }
    function footer(total){
      doc.setFontSize(8);
      doc.setTextColor(210,190,185);
      doc.text(String(pag),W/2,289,{align:'center'});
      if(total!==undefined) doc.text(total+' questões',W-MR,289,{align:'right'});
    }
    function check(need,sec){
      if(y+need>276){
        footer();
        doc.addPage();
        pag++;
        header(sec);
        y=31;
      }
    }
    /* === QUESTÕES === */
    header('questões');
    y=31;
    qs.forEach(function(q,i){
      var linhas=doc.splitTextToSize(q.enunciado,TW-14);
      var altsFilt=LETRAS.filter(function(l){return q.alts[l];});
      var altH=altsFilt.reduce(function(acc,l){
        return acc+doc.splitTextToSize(l+') '+q.alts[l],TW-20).length*5+2;
      },0);
      var h=linhas.length*5.5+altH+12;
      check(h,'questões');
      if(i%2===0){
        doc.setFillColor(255,252,250);
        doc.rect(ML,y,TW,h,'F');
      }
      doc.setDrawColor(BORDA[0],BORDA[1],BORDA[2]);
      doc.rect(ML,y,TW,h);
      doc.setFillColor(ROSA_CL[0],ROSA_CL[1],ROSA_CL[2]);
      doc.rect(ML,y,10,h,'F');
      doc.setFont('times','italic');
      doc.setFontSize(10);
      doc.setTextColor(ROSA[0],ROSA[1],ROSA[2]);
      doc.text(String(i+1),ML+5,y+h/2+3,{align:'center'});
      var iy=y+7;
      doc.setFont('helvetica','normal');
      doc.setFontSize(10);
      doc.setTextColor(50,36,30);
      doc.text(linhas,ML+13,iy);
      iy+=linhas.length*5.5+3;
      altsFilt.forEach(function(l){
        var txt=l+') '+q.alts[l];
        var lns=doc.splitTextToSize(txt,TW-20);
        doc.setFontSize(9.5);
        doc.setTextColor(110,85,75);
        doc.text(lns,ML+14,iy);
        iy+=lns.length*5+2;
      });
      y+=h+3;
    });
    footer();
    /* === GABARITO === */
    doc.addPage(); pag++;
    header('gabarito');
    y=31;
    doc.setFillColor(ROSA_CL[0],ROSA_CL[1],ROSA_CL[2]);
    doc.rect(ML,y,TW,8,'F');
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.setTextColor(ROSA[0],ROSA[1],ROSA[2]);
    doc.text('nº',ML+5,y+5.5,{align:'center'});
    doc.text('resposta',ML+20,y+5.5);
    y+=8;
    qs.forEach(function(q,i){
      check(8,'gabarito');
      if(i%2===0){
        doc.setFillColor(255,252,250);
        doc.rect(ML,y,TW,8,'F');
      }
      doc.setDrawColor(BORDA[0],BORDA[1],BORDA[2]);
      doc.rect(ML,y,TW,8);
      doc.setFont('times','italic');
      doc.setFontSize(10);
      doc.setTextColor(ROSA[0],ROSA[1],ROSA[2]);
      doc.text(String(i+1),ML+5,y+5.5,{align:'center'});
      doc.setFillColor(ROSA[0],ROSA[1],ROSA[2]);
      doc.roundedRect(ML+14,y+1.5,16,5,2,2,'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(9);
      doc.setTextColor(255,255,255);
      doc.text(q.correta,ML+22,y+5.5,{align:'center'});
      y+=8;
    });
    footer(qs.length);
    var nome=titulo.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'')+'.pdf';
    doc.save(nome||'lista.pdf');
    statusEl.textContent='pdf gerado com '+qs.length+' questão(ões)!';
    statusEl.className='status ok';
  }
  /* init */
  document.getElementById('btn-add').addEventListener('click', addQuestao);
  document.getElementById('btn-gerar').addEventListener('click', gerarPDF);
  addQuestao();
  addQuestao();
})();
</script>
</body>
</html>
