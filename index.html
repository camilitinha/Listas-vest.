<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Exercícios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <header class="topo">
      <h1>lista de exercícios</h1>
      <p class="sub">preencha as questões e gere seu PDF com gabarito embaralhado</p>
    </header>
    <div class="card">
      <div class="field-row">
        <div class="field">
          <label>título</label>
          <input type="text" id="titulo" placeholder="ex: Simulado de Biologia" />
        </div>
        <div class="field">
          <label>disciplina</label>
          <input type="text" id="disciplina" placeholder="ex: Química" />
        </div>
        <div class="field">
          <label>banca</label>
          <input type="text" id="banca" placeholder="ex: FUVEST" />
        </div>
      </div>
    </div>
    <div class="card">
      <p class="hint">adicione quantas questões quiser — alternativas de A a E.</p>
      <div id="lista-questoes"></div>
      <button type="button" class="btn-add" id="btn-add">+ nova questão</button>
    </div>
    <div class="rodape">
      <button type="button" class="btn-gerar" id="btn-pdf">gerar PDF</button>
      <span class="status" id="status"></span>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
